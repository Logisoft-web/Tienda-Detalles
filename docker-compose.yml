version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:4005/api
    container_name: hecho-con-amor-frontend
    restart: unless-stopped
    ports:
      - "3005:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hecho-con-amor-backend
    restart: unless-stopped
    ports:
      - "4005:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=hechoconamor
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - JWT_SECRET=hca_secret_change_in_production
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: hecho-con-amor-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=hechoconamor
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - hca_pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  hca_pgdata:
